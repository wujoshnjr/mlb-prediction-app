name: Hourly Prediction Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      collect_from:
        description: '歷史資料回補開始日期 (YYYY-MM-DD)'
        required: false
        type: string
      collect_to:
        description: '歷史資料回補結束日期 (YYYY-MM-DD)'
        required: false
        type: string
      backfill_final_scores:
        description: '回補歷史正式比分（輸入 true）'
        required: false
        default: 'false'
        type: string
      rebuild_ratings:
        description: '從 finalized games 安全重建 rating（輸入 true）'
        required: false
        default: 'false'
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  update-and-predict:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile critical Python files
        run: |
          files=(
            config.py
            main.py
            model.py
            prediction.py
            train_ensemble.py
            scripts/feature_schema.py
            scripts/model_training_common.py
            scripts/training_samples_builder.py
            scripts/update_results.py
            scripts/repair_finalized_linkage.py
            scripts/model_artifact_status.py
            scripts/model_status_consistency_report.py
            scripts/artifact_rebuild_readiness_report.py
            scripts/feature_contract_report.py
            scripts/feature_missingness_report.py
            scripts/model_eval_report.py
            scripts/calibration_report.py
            scripts/per_slice_performance_report.py
            scripts/sample_state_builder.py
            scripts/backfill_final_scores.py
            scripts/rebuild_ratings.py
            scripts/rating_updater.py
            scripts/glicko2_ratings.py
            scripts/historical_collector.py
            scripts/validate_predictions.py
            scripts/data_contract_validator.py
            scripts/pipeline_manifest.py
            scripts/report_health_gate.py
            scripts/sanitize_prediction_report.py
            scripts/sanitize_prediction_snapshots.py
            scripts/html_report_builder.py
            scripts/build_public_site_data.py
            scripts/baseline_comparison_report.py
            scripts/clv_slice_report.py
            scripts/walkforward_evaluation.py
            scripts/rolling_walkforward_evaluation.py
            scripts/lineup_starter_slice_report.py
            scripts/market_close_report.py
            scripts/settle_reliability_report.py
            scripts/settled_prediction_link_report.py
            scripts/model_registry.py
            scripts/promotion_gate.py
            scripts/decision_audit_report.py
            scripts/paper_trading_ledger.py
            scripts/risk_exposure_report.py
            scripts/artifact_retention_manifest.py
            scripts/world_class_trading_system_report.py
            scripts/saas_readiness_report.py
            scripts/research_quality_report.py
            scripts/research_promotion_readiness_report.py
            scripts/daily_model_accuracy_report.py
            scripts/accuracy_root_cause_report.py
            scripts/away_pick_diagnostic_report.py
            scripts/away_guardrail_impact_report.py
            scripts/signal_quality_report.py
            scripts/product_experience_report.py
          )
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              python -m py_compile "$file"
            else
              echo "Skipping missing optional compile target: $file"
            fi
          done

      - name: Run hourly prediction pipeline
        env:
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          APISPORTS_BASEBALL_KEY: ${{ secrets.APISPORTS_BASEBALL_KEY }}
          APISPORTS_BASEBALL_LEAGUE_ID: ${{ secrets.APISPORTS_BASEBALL_LEAGUE_ID }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set -euo pipefail

          run_required() {
            echo "::group::required $*"
            "$@"
            echo "::endgroup::"
          }

          run_optional() {
            echo "::group::optional $*"
            if "$@"; then
              echo "optional step passed: $*"
            else
              echo "optional step failed but pipeline continues: $*"
            fi
            echo "::endgroup::"
          }

          run_if_exists_optional() {
            local script="$1"
            shift || true
            if [ -f "$script" ]; then
              run_optional python "$script" "$@"
            else
              echo "optional script missing, skipped: $script"
            fi
          }

          run_if_exists_required() {
            local script="$1"
            shift || true
            if [ -f "$script" ]; then
              run_required python "$script" "$@"
            else
              echo "required script missing: $script"
              exit 1
            fi
          }

          run_if_exists_required scripts/update_results.py
          run_if_exists_optional scripts/repair_finalized_linkage.py
          run_if_exists_optional scripts/outcome_linkage_diagnostic.py
          run_if_exists_required scripts/training_samples_builder.py
          run_if_exists_required scripts/model_artifact_status.py
          run_if_exists_required scripts/sample_state_builder.py

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.backfill_final_scores }}" = "true" ]; then
            run_if_exists_required scripts/backfill_final_scores.py
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.rebuild_ratings }}" = "true" ]; then
            run_if_exists_required scripts/rebuild_ratings.py
          else
            run_if_exists_required scripts/rating_updater.py
          fi

          run_required python train_ensemble.py
          run_if_exists_required scripts/model_artifact_status.py
          run_if_exists_optional scripts/train_model_lab.py
          run_if_exists_optional scripts/training_diagnostic.py
          run_if_exists_optional scripts/daily_context_collector.py
          run_if_exists_optional scripts/weather_context_client.py
          run_if_exists_optional scripts/top3_player_source_client.py
          run_if_exists_optional scripts/apisports_diagnostic.py
          run_if_exists_optional scripts/savant_top3_context_client.py
          run_if_exists_optional scripts/pitcher_advanced_context_client.py
          run_if_exists_optional scripts/team_form_context_client.py
          run_if_exists_optional scripts/context_feature_bridge_client.py
          run_if_exists_optional scripts/projected_lineup_client.py

          run_required python prediction.py
          run_if_exists_required scripts/sanitize_prediction_report.py
          run_if_exists_required scripts/model_status_consistency_report.py
          run_if_exists_optional scripts/context_diagnostic.py
          run_if_exists_optional scripts/odds_matching_diagnostic.py
          run_if_exists_optional scripts/evaluation_clv_diagnostic.py
          run_if_exists_optional scripts/market_edge_research.py
          run_if_exists_optional scripts/train_market_residual_shadow.py
          run_if_exists_optional scripts/baseline_comparison_report.py
          run_if_exists_optional scripts/clv_slice_report.py
          run_if_exists_optional scripts/walkforward_evaluation.py
          run_if_exists_optional scripts/rolling_walkforward_evaluation.py
          run_if_exists_optional scripts/lineup_starter_slice_report.py
          run_if_exists_optional scripts/market_close_report.py
          run_if_exists_optional scripts/feature_availability_diagnostic.py
          run_if_exists_optional scripts/feature_grade_report.py
          run_if_exists_optional scripts/feature_promotion_report.py
          run_if_exists_optional scripts/run_walk_forward_validation.py
          run_if_exists_optional scripts/generate_calibration_diagnostics.py
          run_if_exists_optional scripts/generate_prediction_trust_report.py
          run_if_exists_optional scripts/generate_model_comparison_report.py
          run_if_exists_optional scripts/model_decision_guardrail_report.py
          run_if_exists_optional scripts/train_shadow_ensemble_stack.py
          run_if_exists_optional scripts/feature_zero_root_cause_diagnostic.py
          run_if_exists_required scripts/sanitize_prediction_snapshots.py
          run_if_exists_optional scripts/settle_reliability_report.py
          run_if_exists_optional scripts/settled_prediction_link_report.py
          run_if_exists_required scripts/sample_state_builder.py
          run_if_exists_optional scripts/lineup_quality_builder.py
          run_if_exists_optional scripts/feature_freshness_report.py
          run_if_exists_optional scripts/underdog_diagnostic_report.py
          run_if_exists_optional scripts/confidence_bucket_guardrail.py
          run_if_exists_optional scripts/edge_sanity_guardrail.py
          run_if_exists_optional scripts/slice_promotion_gate.py
          run_if_exists_optional scripts/model_correctness_report.py
          run_if_exists_optional scripts/daily_model_accuracy_report.py
          run_if_exists_optional scripts/accuracy_root_cause_report.py
          run_if_exists_optional scripts/away_pick_diagnostic_report.py
          run_if_exists_optional scripts/away_guardrail_impact_report.py
          run_if_exists_optional scripts/signal_quality_report.py
          run_if_exists_optional scripts/product_experience_report.py
          run_if_exists_optional scripts/research_quality_report.py
          run_if_exists_optional scripts/model_registry.py
          run_if_exists_optional scripts/research_promotion_readiness_report.py

          run_if_exists_optional scripts/html_report_builder.py
          run_if_exists_required scripts/artifact_rebuild_readiness_report.py
          run_if_exists_required scripts/feature_contract_report.py
          run_if_exists_required scripts/feature_missingness_report.py
          run_if_exists_required scripts/model_eval_report.py
          run_if_exists_required scripts/calibration_report.py
          run_if_exists_required scripts/per_slice_performance_report.py
          run_if_exists_required scripts/data_contract_validator.py
          run_if_exists_optional scripts/accuracy_root_cause_report.py
          run_if_exists_required scripts/pipeline_manifest.py
          run_if_exists_optional scripts/promotion_gate.py
          run_if_exists_optional scripts/decision_audit_report.py
          run_if_exists_optional scripts/paper_trading_ledger.py
          run_if_exists_optional scripts/risk_exposure_report.py
          run_if_exists_optional scripts/artifact_retention_manifest.py
          run_if_exists_optional scripts/world_class_trading_system_report.py
          run_if_exists_optional scripts/saas_readiness_report.py
          run_if_exists_optional scripts/html_report_builder.py
          run_if_exists_required scripts/data_contract_validator.py
          run_if_exists_required scripts/report_health_gate.py
          run_if_exists_required scripts/build_public_site_data.py
          run_if_exists_required scripts/pipeline_manifest.py
          run_if_exists_required scripts/sanitize_prediction_snapshots.py

      - name: Run tests
        run: pytest -q
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Validate prediction report and rating state
        run: python scripts/validate_predictions.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload daily prediction artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: daily-prediction-artifacts
          retention-days: 14
          if-no-files-found: warn
          path: |
            report/*.json
            report/*.csv
            data/model_lab/
            docs/*.md
            report/index.html
            data/training_samples.csv
            data/oos_predictions_with_labels.csv
            data/model_artifact_status.json
            data/training_status.json
            data/model_registry.json
            data/sample_state.json
            data/paper_trading_ledger.csv
            data/calibrator.pkl
            data/market_residual_model.pkl
            data/prediction_snapshots.csv
            data/market_odds_history.csv
            data/daily_game_context.csv
            data/weather_context.csv
            data/top3_player_context.csv
            data/savant_top3_context.csv
            data/pitcher_advanced_context.csv
            data/team_form_context.csv
            data/context_feature_bridge.csv
            data/projected_lineup_context.csv

      - name: Commit validated outputs
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME:-main}"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          stage_outputs() {
            git add -u report data docs site || true
            if [ -d report ]; then git add -f report/ || true; fi
            if [ -d data ]; then
              git add -f data/*.csv data/*.json data/*.pkl 2>/dev/null || true
            fi
            if [ -d data/historical ]; then git add -f data/historical/ || true; fi
            if [ -d data/odds_snapshots ]; then git add -f data/odds_snapshots/ || true; fi
            if [ -d data/model_lab ]; then git add -f data/model_lab/ || true; fi
            if [ -d docs ]; then git add -f docs/*.md 2>/dev/null || true; fi
            if [ -d site ]; then git add -f site/ || true; fi
          }

          stage_outputs
          echo "Git status after staging generated outputs:"
          git status --short

          if git diff --cached --quiet; then
            echo "No generated output changes to commit."
          else
            git commit -m "Update prediction, training and ratings [skip ci]"
          fi

          echo "Rebasing on latest remote branch with autostash to tolerate dirty generated worktrees."
          git pull --rebase --autostash origin "$BRANCH"

          if ! git push origin "HEAD:$BRANCH"; then
            echo "Initial push failed; rebasing once more and retrying."
            git pull --rebase --autostash origin "$BRANCH"
            git push origin "HEAD:$BRANCH"
          fi

  collect-history:
    runs-on: ubuntu-latest
    needs: update-and-predict
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.collect_from == '' && github.event.inputs.collect_to == '') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile historical collector
        run: |
          python -m py_compile \
            model.py \
            scripts/historical_collector.py

      - name: Collect yesterday historical features
        run: python scripts/historical_collector.py $(date -u -d "yesterday" +%Y-%m-%d)
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Commit historical data
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME:-main}"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          if [ -d data/historical ]; then
            git add -f data/historical/
          fi

          if git diff --cached --quiet; then
            echo "No historical data changes to commit."
          else
            git commit -m "Add historical data for $(date -u -d 'yesterday' +%Y-%m-%d) [skip ci]"
          fi

          git pull --rebase --autostash origin "$BRANCH"
          if ! git push origin "HEAD:$BRANCH"; then
            git pull --rebase --autostash origin "$BRANCH"
            git push origin "HEAD:$BRANCH"
          fi

  backfill-history:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.collect_from != '' && github.event.inputs.collect_to != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile historical backfill files
        run: |
          python -m py_compile \
            model.py \
            scripts/historical_collector.py

      - name: Backfill historical features
        run: python scripts/historical_collector.py "${{ github.event.inputs.collect_from }}" "${{ github.event.inputs.collect_to }}"
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Commit historical data
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME:-main}"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          if [ -d data/historical ]; then
            git add -f data/historical/
          fi

          if git diff --cached --quiet; then
            echo "No historical backfill changes to commit."
          else
            git commit -m "Backfill historical data ${{ github.event.inputs.collect_from }} to ${{ github.event.inputs.collect_to }} [skip ci]"
          fi

          git pull --rebase --autostash origin "$BRANCH"
          if ! git push origin "HEAD:$BRANCH"; then
            git pull --rebase --autostash origin "$BRANCH"
            git push origin "HEAD:$BRANCH"
          fi
