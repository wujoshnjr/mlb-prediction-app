name: Hourly Prediction Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      collect_from:
        description: '开始日期 (YYYY-MM-DD)'
        required: false
      collect_to:
        description: '结束日期 (YYYY-MM-DD)'
        required: false
      rebuild_ratings:
        description: '手动重建评级 (输入 true)'
        required: false
        default: 'false'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-and-predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: (Optional) Rebuild ratings
        if: github.event.inputs.rebuild_ratings == 'true'
        run: python scripts/rebuild_ratings.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Update game results
        run: python scripts/update_results.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Update ratings
        run: python scripts/rating_updater.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Train model (if needed)
        run: python train_ensemble.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Generate prediction
        run: python prediction.py
        env:
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}

      - name: Validate predictions
        run: python scripts/validate_predictions.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Commit validated outputs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add -f report/prediction.json
          if [ -f data/historical_predictions.csv ]; then git add -f data/historical_predictions.csv; fi
          if [ -f data/new_final_results.json ]; then git add -f data/new_final_results.json; fi
          if [ -f data/elo_ratings.json ]; then git add -f data/elo_ratings.json; fi
          if [ -f data/glicko2_ratings.json ]; then git add -f data/glicko2_ratings.json; fi
          if [ -f data/calibrator.pkl ]; then git add -f data/calibrator.pkl; fi
          if [ -f data/rated_game_ids.json ]; then git add -f data/rated_game_ids.json; fi
          if [ -f data/training_status.json ]; then git add -f data/training_status.json; fi
          git commit -m "Update prediction & ratings [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push

  collect-history:
    runs-on: ubuntu-latest
    needs: update-and-predict
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest changes
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git pull --rebase origin main

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas requests pyarrow

      - name: Collect yesterday's data
        run: python scripts/historical_collector.py $(date -d "yesterday" +%Y-%m-%d)
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Commit historical data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add -f data/historical/
          git commit -m "Add historical data for $(date -d 'yesterday' +%Y-%m-%d)" || echo "No changes"
          git pull --rebase origin main
          git push

  backfill-history:
    runs-on: ubuntu-latest
    if: github.event.inputs.collect_from && github.event.inputs.collect_to
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest changes
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git pull --rebase origin main

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas requests pyarrow

      - name: Backfill history
        run: python scripts/historical_collector.py ${{ github.event.inputs.collect_from }} ${{ github.event.inputs.collect_to }}
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Commit data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add -f data/historical/
          git commit -m "Backfill historical data ${{ github.event.inputs.collect_from }} to ${{ github.event.inputs.collect_to }}" || echo "No changes"
          git pull --rebase origin main
          git push
