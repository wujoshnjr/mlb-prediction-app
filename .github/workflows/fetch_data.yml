name: Hourly Prediction Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run prediction
        run: python prediction.py
        env:
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Commit prediction & history
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f report/prediction.json
          if [ -f data/historical_predictions.csv ]; then
            git add -f data/historical_predictions.csv
          fi
          if [ -f data/elo_ratings.json ]; then
            git add -f data/elo_ratings.json
          fi
          git commit -m "Update prediction & history [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push

  update-results:
    runs-on: ubuntu-latest
    needs: predict
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest changes
        run: git pull --rebase origin main

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pandas xgboost scikit-learn joblib

      - name: Update game results
        run: python scripts/update_results.py

      - name: Update ELO from results
        run: python scripts/elo_updater.py

      - name: Run backtest
        run: python scripts/backtest.py

      - name: Train model if enough data
        run: python train_xgboost.py
        if: success()

      - name: Commit results, ELO, and model
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f data/historical_predictions.csv ]; then
            git add -f data/historical_predictions.csv
          fi
          if [ -f data/elo_ratings.json ]; then
            git add -f data/elo_ratings.json
          fi
          if [ -f data/calibrator.pkl ]; then
            git add -f data/calibrator.pkl
          fi
          git commit -m "Update game results, ELO & model [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push
          collect-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install pandas requests
      - name: Collect yesterday's data
        run: |
          python scripts/historical_collector.py $(date -d "yesterday" +%Y-%m-%d)
      - name: Commit history
        run: |
          git config --global user.name "github-actions[bot]"
          git add data/historical/
          git commit -m "Add historical data for $(date -d 'yesterday' +%Y-%m-%d)" || echo "No changes"
          git pull --rebase origin main
          git push
