name: Hourly Prediction Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      collect_from:
        description: '开始日期 (YYYY-MM-DD)'
        required: false
      collect_to:
        description: '结束日期 (YYYY-MM-DD)'
        required: false

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run prediction
        run: python prediction.py
        env:
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Commit prediction & history
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f report/prediction.json
          if [ -f data/historical_predictions.csv ]; then git add -f data/historical_predictions.csv; fi
          if [ -f data/elo_ratings.json ]; then git add -f data/elo_ratings.json; fi
          git commit -m "Update prediction & history [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push

  update-results:
    runs-on: ubuntu-latest
    needs: predict
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest changes
        run: git pull --rebase origin main

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas requests xgboost scikit-learn joblib optuna lightgbm

      - name: Update game results
        run: python scripts/update_results.py

      - name: Update ELO from results
        run: python scripts/elo_updater.py

      - name: Run backtest
        id: backtest
        run: |
          python scripts/backtest.py | tee backtest_output.txt
          echo "BRIER=$(grep 'Brier Score' backtest_output.txt | awk '{print $NF}')" >> $GITHUB_ENV
          echo "LOGLOSS=$(grep 'Log Loss' backtest_output.txt | awk '{print $NF}')" >> $GITHUB_ENV

      - name: Conditional model retraining
        if: steps.backtest.outputs.BRIER != ''
        run: |
          BRIER_VALUE=${{ env.BRIER }}
          echo "Brier Score: $BRIER_VALUE"
          if (( $(echo "$BRIER_VALUE > 0.25" | bc -l) )); then
            echo "⚠️ Brier Score 过高，自动触发重训练..."
            python train_ensemble.py
          else
            echo "✅ 模型性能达标，跳过重训练"
          fi

      - name: Commit results, ELO, and model
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f data/historical_predictions.csv ]; then git add -f data/historical_predictions.csv; fi
          if [ -f data/elo_ratings.json ]; then git add -f data/elo_ratings.json; fi
          if [ -f data/calibrator.pkl ]; then git add -f data/calibrator.pkl; fi
          git commit -m "Update game results, ELO & model [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push

  collect-history:
    runs-on: ubuntu-latest
    needs: update-results
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest changes
        run: git pull --rebase origin main

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas requests pyarrow

      - name: Collect yesterday's data
        run: |
          python scripts/historical_collector.py $(date -d "yesterday" +%Y-%m-%d)

      - name: Commit historical data
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/historical/
          git commit -m "Add historical data for $(date -d 'yesterday' +%Y-%m-%d)" || echo "No changes"
          git pull --rebase origin main
          git push

  backfill-history:
    runs-on: ubuntu-latest
    if: github.event.inputs.collect_from && github.event.inputs.collect_to
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install pandas requests pyarrow
      - name: Backfill history
        run: |
          python scripts/historical_collector.py ${{ github.event.inputs.collect_from }} ${{ github.event.inputs.collect_to }}
      - name: Commit data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/historical/
          git commit -m "Backfill historical data ${{ github.event.inputs.collect_from }} to ${{ github.event.inputs.collect_to }}" || echo "No changes"
          git pull --rebase origin main
          git push
