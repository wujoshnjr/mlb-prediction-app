name: Hourly Fetch All Data Sources

on:
  schedule:
    - cron: '0 * * * *'   # 每小時整點執行
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unified model fetch
        run: |
          python -c "from model import UnifiedSportsModel; m = UnifiedSportsModel(); data = m.gather_all_data(); print('Fetch successful:', len(data))"
        env:
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
