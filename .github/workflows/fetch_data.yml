name: Hourly Prediction Update

on:
  schedule:
    - cron: '0 * * * *'   # 每小時整點執行
  workflow_dispatch:       # 允許手動觸發

permissions:
  contents: write          # 授權推送檔案回倉庫

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5          # ✅ 改用 v5（支援 Node.js 24）
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6       # ✅ 改用 v6（支援 Node.js 24）
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run prediction
        run: python prediction.py
        env:
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Commit prediction report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add report/prediction.json
          git commit -m "Update prediction report [skip ci]" || echo "No changes"
          git push
