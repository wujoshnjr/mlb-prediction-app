name: Hourly Prediction Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run prediction
        run: python prediction.py
        env:
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      - name: Commit prediction & history
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f report/prediction.json
          git add -f data/historical_predictions.csv
          git add -f data/elo_ratings.json
          git commit -m "Update prediction & history [skip ci]" || echo "No changes"
          git push

  update-results:
    runs-on: ubuntu-latest
    needs: predict
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests pandas
      - name: Update game results
        run: python scripts/update_results.py
      - name: Update ELO from results
        run: python scripts/elo_updater.py
      - name: Run backtest
        run: python scripts/backtest.py
      - name: Commit results
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/historical_predictions.csv
          git add data/elo_ratings.json
          git commit -m "Update game results & ELO [skip ci]" || echo "No changes"
          git push
