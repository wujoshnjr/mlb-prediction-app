name: Hourly Prediction Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      collect_from:
        description: '开始日期 (YYYY-MM-DD)'
        required: false
      collect_to:
        description: '结束日期 (YYYY-MM-DD)'
        required: false

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run prediction
        run: python prediction.py
        env:
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}

      - name: Commit prediction & history
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add -f report/prediction.json
          if [ -f data/historical_predictions.csv ]; then git add -f data/historical_predictions.csv; fi
          if [ -f data/elo_ratings.json ]; then git add -f data/elo_ratings.json; fi
          if [ -f data/glicko2_ratings.json ]; then git add -f data/glicko2_ratings.json; fi
          git commit -m "Update prediction & history [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push

  update-results:
    runs-on: ubuntu-latest
    needs: predict
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest changes
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git pull --rebase origin main

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update game results
        run: python scripts/update_results.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Update ratings (Glicko2/ELO)
        run: python scripts/rating_updater.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run backtest
        id: backtest
        run: |
          python scripts/backtest.py 2>&1 | tee backtest_output.txt
          BRIER=$(grep -oP 'Brier Score:\s*\K[\d.]+' backtest_output.txt || echo "0.25")
          echo "BRIER=$BRIER" >> $GITHUB_ENV
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Force retrain model
        run: |
          python train_ensemble.py
          if [ ! -f data/calibrator.pkl ]; then
            echo "ERROR: calibrator.pkl was not generated"
            exit 1
          fi
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Validate predictions
        run: python scripts/validate_predictions.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Commit results, ratings & model
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          if [ -f data/historical_predictions.csv ]; then git add -f data/historical_predictions.csv; fi
          if [ -f data/elo_ratings.json ]; then git add -f data/elo_ratings.json; fi
          if [ -f data/glicko2_ratings.json ]; then git add -f data/glicko2_ratings.json; fi
          if [ -f data/calibrator.pkl ]; then git add -f data/calibrator.pkl; fi
          git commit -m "Update game results, ratings & model [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push

  collect-history:
    runs-on: ubuntu-latest
    needs: update-results
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest changes
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git pull --rebase origin main

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas requests pyarrow

      - name: Collect yesterday's data
        run: |
          python scripts/historical_collector.py $(date -d "yesterday" +%Y-%m-%d)
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Commit historical data
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add -f data/historical/
          git commit -m "Add historical data for $(date -d 'yesterday' +%Y-%m-%d)" || echo "No changes"
          git pull --rebase origin main
          git push

  backfill-history:
    runs-on: ubuntu-latest
    if: github.event.inputs.collect_from && github.event.inputs.collect_to
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest changes
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git pull --rebase origin main

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas requests pyarrow

      - name: Backfill history
        run: |
          python scripts/historical_collector.py ${{ github.event.inputs.collect_from }} ${{ github.event.inputs.collect_to }}
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Commit data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add -f data/historical/
          git commit -m "Backfill historical data ${{ github.event.inputs.collect_from }} to ${{ github.event.inputs.collect_to }}" || echo "No changes"
          git pull --rebase origin main
          git push
