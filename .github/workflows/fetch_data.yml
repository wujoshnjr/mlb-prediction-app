name: Hourly Prediction Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      collect_from:
        description: '歷史資料回補開始日期 (YYYY-MM-DD)'
        required: false
        type: string
      collect_to:
        description: '歷史資料回補結束日期 (YYYY-MM-DD)'
        required: false
        type: string
      backfill_final_scores:
        description: '回補歷史正式比分（輸入 true）'
        required: false
        default: 'false'
        type: string
      rebuild_ratings:
        description: '從 finalized games 安全重建 rating（輸入 true）'
        required: false
        default: 'false'
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-and-predict:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile critical Python files
        run: |
           python -m py_compile \
            config.py \
            main.py \
            model.py \
            prediction.py \
            train_ensemble.py \
            scripts/feature_schema.py \
            scripts/snapshot_store.py \
            scripts/market_odds_store.py \
            scripts/daily_game_context.py \
            scripts/lineup_client.py \
            scripts/pitcher_client.py \
            scripts/bullpen_context_client.py \
            scripts/closer_context_client.py \
            scripts/starter_confidence_client.py \
            scripts/mlb_game_feed_client.py \
            scripts/apisports_lineup_client.py \
            scripts/apisports_diagnostic.py \
            scripts/odds_matching_diagnostic.py \
            scripts/training_diagnostic.py \
            scripts/context_diagnostic.py \
            scripts/daily_context_collector.py \
            scripts/savant_top3_context_client.py \
            scripts/update_results.py \
            scripts/backfill_final_scores.py \
            scripts/rebuild_ratings.py \
            scripts/rating_updater.py \
            scripts/glicko2_ratings.py \
            scripts/historical_collector.py \
            scripts/validate_predictions.py \
            scripts/evaluation_clv_diagnostic.py \
            scripts/feature_availability_diagnostic.py \
            scripts/market_edge_research.py \
            scripts/risk_guard.py \
            scripts/market_residual_model.py \
            scripts/train_market_residual_shadow.py \
            scripts/weather_context_client.py \
            scripts/top3_player_source_client.py \
            scripts/pitcher_advanced_context_client.py \
            scripts/team_form_context_client.py \
            scripts/context_feature_bridge_client.py \
            scripts/feature_zero_root_cause_diagnostic.py \
            scripts/feature_grade_report.py \
            scripts/report_health_gate.py \
            scripts/baseline_comparison_report.py \
            scripts/clv_slice_report.py \
            scripts/calibration_report.py \
            scripts/walkforward_evaluation.py \
            scripts/html_report_builder.py \
            scripts/data_contract_validator.py \
            scripts/pipeline_manifest.py \
            scripts/sanitize_prediction_report.py \
            scripts/sanitize_prediction_snapshots.py \
            scripts/settle_reliability_report.py \
            scripts/settled_prediction_link_report.py \
            scripts/rolling_walkforward_evaluation.py \
            scripts/lineup_starter_slice_report.py \
            scripts/market_close_report.py \
            scripts/research_quality_report.py \
            scripts/model_registry.py \
            scripts/promotion_gate.py \
            scripts/decision_audit_report.py \
            scripts/paper_trading_ledger.py \
            scripts/risk_exposure_report.py \
            scripts/artifact_retention_manifest.py \
            scripts/world_class_trading_system_report.py \
            scripts/projected_lineup_client.py
            
      - name: Update finalized game results
        run: python scripts/update_results.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Backfill historical final scores
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.backfill_final_scores == 'true' }}
        run: python scripts/backfill_final_scores.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Rebuild ratings from finalized history
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.rebuild_ratings == 'true' }}
        run: python scripts/rebuild_ratings.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload repair diagnostic reports
        if: ${{ always() && github.event_name == 'workflow_dispatch' && (github.event.inputs.backfill_final_scores == 'true' || github.event.inputs.rebuild_ratings == 'true') }}
        uses: actions/upload-artifact@v4
        with:
          name: repair-diagnostic-reports
          path: |
            report/final_score_backfill_report.json
            report/rating_rebuild_report.json
          if-no-files-found: warn

      - name: Incrementally update ratings
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.rebuild_ratings == 'true') }}
        run: python scripts/rating_updater.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Train model if enough finalized samples are available
        run: python train_ensemble.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Diagnose model training
        continue-on-error: true
        run: python scripts/training_diagnostic.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Collect daily pregame context snapshots
        continue-on-error: true
        run: python scripts/daily_context_collector.py
        env:
          APISPORTS_BASEBALL_KEY: ${{ secrets.APISPORTS_BASEBALL_KEY }}
          APISPORTS_BASEBALL_LEAGUE_ID: ${{ secrets.APISPORTS_BASEBALL_LEAGUE_ID }}
          PYTHONPATH: ${{ github.workspace }}

      - name: Build weather context
        continue-on-error: true
        run: python scripts/weather_context_client.py
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}

      - name: Build top-3 player source
        timeout-minutes: 4
        continue-on-error: true
        run: python scripts/top3_player_source_client.py
        env:
          PYTHONPATH: ${{ github.workspace }}
          
      - name: Diagnose API-Sports Baseball
        continue-on-error: true
        run: python scripts/apisports_diagnostic.py
        env:
          APISPORTS_BASEBALL_KEY: ${{ secrets.APISPORTS_BASEBALL_KEY }}
          APISPORTS_BASEBALL_LEAGUE_ID: ${{ secrets.APISPORTS_BASEBALL_LEAGUE_ID }}
          PYTHONPATH: ${{ github.workspace }}

      - name: Build Savant top-3 hitter context
        timeout-minutes: 20
        continue-on-error: true
        run: python scripts/savant_top3_context_client.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build pitcher advanced context
        timeout-minutes: 4
        continue-on-error: true
        run: python scripts/pitcher_advanced_context_client.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build team form context
        continue-on-error: true
        run: python scripts/team_form_context_client.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build context feature bridge
        continue-on-error: true
        run: python scripts/context_feature_bridge_client.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build projected lineup context
        continue-on-error: true
        run: python scripts/projected_lineup_client.py
        env:
          PYTHONPATH: ${{ github.workspace }}
          
      - name: Generate prediction report
        run: python prediction.py
        env:
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}

      - name: Sanitize prediction report for health gate
        run: python scripts/sanitize_prediction_report.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Diagnose context readiness
        continue-on-error: true
        run: python scripts/context_diagnostic.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Diagnose odds matching
        continue-on-error: true
        run: python scripts/odds_matching_diagnostic.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Diagnose evaluation and CLV
        continue-on-error: true
        run: python scripts/evaluation_clv_diagnostic.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Research market edge buckets
        continue-on-error: true
        run: python scripts/market_edge_research.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Train market residual shadow model
        continue-on-error: true
        run: python scripts/train_market_residual_shadow.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build baseline comparison report
        run: python scripts/baseline_comparison_report.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build CLV slice reports
        run: python scripts/clv_slice_report.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build calibration report
        run: python scripts/calibration_report.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build walk-forward evaluation report
        run: python scripts/walkforward_evaluation.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build rolling walk-forward evaluation report
        run: python scripts/rolling_walkforward_evaluation.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build lineup and starter slice report
        run: python scripts/lineup_starter_slice_report.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build market close report
        run: python scripts/market_close_report.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Diagnose feature availability
        continue-on-error: false
        run: python scripts/feature_availability_diagnostic.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build feature grade report
        continue-on-error: false
        run: python scripts/feature_grade_report.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Diagnose feature zero root cause
        continue-on-error: false
        run: python scripts/feature_zero_root_cause_diagnostic.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Sanitize prediction snapshots for no-leakage policy
        run: python scripts/sanitize_prediction_snapshots.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build settle reliability report
        run: python scripts/settle_reliability_report.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build settled prediction link report
        run: python scripts/settled_prediction_link_report.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build research quality report
        run: python scripts/research_quality_report.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build model registry
        run: python scripts/model_registry.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build HTML report
        run: python scripts/html_report_builder.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Validate data contracts
        run: python scripts/data_contract_validator.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build pipeline manifest
        run: python scripts/pipeline_manifest.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build promotion gate report
        run: python scripts/promotion_gate.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build decision audit report
        run: python scripts/decision_audit_report.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build paper trading ledger
        run: python scripts/paper_trading_ledger.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build risk exposure report
        run: python scripts/risk_exposure_report.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build artifact retention manifest
        run: python scripts/artifact_retention_manifest.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build world-class trading system report
        run: python scripts/world_class_trading_system_report.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build final HTML report
        run: python scripts/html_report_builder.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Validate final data contracts
        run: python scripts/data_contract_validator.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build final pipeline manifest
        run: python scripts/pipeline_manifest.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Validate report health gate
        run: python scripts/report_health_gate.py
        env:
          PYTHONPATH: ${{ github.workspace }}
          
      - name: Sanitize prediction snapshots for no-leakage policy
        run: python scripts/sanitize_prediction_snapshots.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run tests
        run: pytest -q
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Validate prediction report and rating state
        run: python scripts/validate_predictions.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload daily prediction artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: daily-prediction-artifacts
          retention-days: 14
          if-no-files-found: warn
          path: |
            report/*.json
            report/*.csv
            report/data_contract_report.json
            report/pipeline_manifest.json
            report/index.html
            report/walkforward_predictions.csv
            report/rolling_walkforward_predictions.csv
            report/decision_audit.csv
            data/model_registry.json
            data/paper_trading_ledger.csv
            data/calibrator.pkl
            data/market_residual_model.pkl
            data/prediction_snapshots.csv
            data/market_odds_history.csv
            data/daily_game_context.csv
            data/weather_context.csv
            data/top3_player_context.csv
            data/savant_top3_context.csv
            data/pitcher_advanced_context.csv
            data/team_form_context.csv
            data/context_feature_bridge.csv
            data/projected_lineup_context.csv

      - name: Commit validated outputs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          if [ -f report/prediction.json ]; then
            git add -f report/prediction.json
          fi

          for path in \
            report/rating_rebuild_report.json \
            report/final_score_backfill_report.json \
            report/daily_context_collection_report.json \
            report/odds_matching_diagnostic.json \
            report/training_diagnostic.json \
            report/context_diagnostic.json \
            report/evaluation_clv_diagnostic.json \
            report/feature_availability_diagnostic.json \
            report/market_edge_research.json \
            report/market_residual_training_report.json \
            report/feature_zero_root_cause_diagnostic.json \
            report/feature_grade_report.json \
            report/baseline_comparison_report.json \
            report/clv_by_edge_bucket.json \
            report/clv_by_side.json \
            report/clv_by_odds_range.json \
            report/clv_by_lineup_status.json \
            report/calibration_report.json \
            report/walkforward_evaluation.json \
            report/rolling_walkforward_evaluation.json \
            report/rolling_walkforward_predictions.csv \
            report/lineup_starter_slice_report.json \
            report/market_close_report.json \
            report/research_quality_report.json \
            report/settle_reliability_report.json \
            report/settled_prediction_link_report.json \
            report/snapshot_sanitization_report.json \
            report/prediction_sanitization_report.json \
            report/model_registry_report.json \
            report/promotion_gate_report.json \
            report/decision_audit_report.json \
            report/decision_audit.csv \
            report/paper_trading_ledger_report.json \
            report/risk_exposure_report.json \
            report/artifact_retention_manifest.json \
            report/world_class_trading_system_report.json \
            report/data_contract_report.json \
            report/pipeline_manifest.json \
            report/index.html \
            report/walkforward_predictions.csv \
            data/model_registry.json \
            data/paper_trading_ledger.csv \
            data/top3_player_context.csv \
            data/pitcher_advanced_context.csv \
            data/team_form_context.csv \
            data/context_feature_bridge.csv \
            data/market_residual_model.pkl \
            data/projected_lineup_context.csv \
            data/finalized_games.csv \
            data/historical_predictions.csv \
            data/prediction_snapshots.csv \
            data/market_odds_history.csv \
            data/daily_game_context.csv \
            data/weather_context.csv \
            data/savant_top3_context.csv \
            data/new_final_results.json \
            data/elo_ratings.json \
            data/glicko2_ratings.json \
            data/calibrator.pkl \
            data/rated_game_ids.json \
            data/training_status.json \
            data/training_log.csv \
            data/feature_importance.csv \
            data/team_last_game.json; do
            if [ -f "$path" ]; then
              git add -f "$path"
            fi
          done

          if [ -d data/historical ]; then
            git add -f data/historical/
          fi

          if [ -d data/odds_snapshots ]; then
            git add -f data/odds_snapshots/
          fi

          git commit -m "Update prediction, training and ratings [skip ci]" || echo "No changes"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

  collect-history:
    runs-on: ubuntu-latest
    needs: update-and-predict
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.collect_from == '' && github.event.inputs.collect_to == '') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest changes
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git pull --rebase origin "${GITHUB_REF_NAME}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile historical collector
        run: |
          python -m py_compile \
            model.py \
            scripts/historical_collector.py

      - name: Collect yesterday historical features
        run: python scripts/historical_collector.py $(date -u -d "yesterday" +%Y-%m-%d)
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Commit historical data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          if [ -d data/historical ]; then
            git add -f data/historical/
          fi

          git commit -m "Add historical data for $(date -u -d 'yesterday' +%Y-%m-%d) [skip ci]" || echo "No changes"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

  backfill-history:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.collect_from != '' && github.event.inputs.collect_to != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile historical backfill files
        run: |
          python -m py_compile \
            model.py \
            scripts/historical_collector.py

      - name: Backfill historical features
        run: python scripts/historical_collector.py "${{ github.event.inputs.collect_from }}" "${{ github.event.inputs.collect_to }}"
        env:
          PYTHONPATH: ${{ github.workspace }} 

      - name: Commit historical data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          if [ -d data/historical ]; then
            git add -f data/historical/
          fi

          git commit -m "Backfill historical data ${{ github.event.inputs.collect_from }} to ${{ github.event.inputs.collect_to }} [skip ci]" || echo "No changes"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
