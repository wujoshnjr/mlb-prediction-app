name: Model Governance Diagnostics

on:
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

concurrency:
  group: model-governance-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-model-governance-reports:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest generated reports
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git pull --rebase origin "${GITHUB_REF_NAME:-main}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile full governance preflight
        run: |
          python -m py_compile \
            scripts/artifact_quarantine_report.py \
            scripts/feature_missingness_report.py \
            scripts/feature_source_coverage_report.py \
            scripts/feature_priority_report.py \
            scripts/walkforward_evaluation.py \
            scripts/report_health_gate.py \
            scripts/data_contract_validator.py \
            scripts/repo_anomaly_report.py \
            scripts/model_data_root_cause_report.py \
            scripts/html_report_builder.py \
            scripts/build_public_site_data.py \
            scripts/pipeline_manifest.py

      - name: Build feature missingness source report
        run: python scripts/feature_missingness_report.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build feature source coverage report
        run: python scripts/feature_source_coverage_report.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build feature priority report
        run: python scripts/feature_priority_report.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build artifact quarantine report
        run: python scripts/artifact_quarantine_report.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build walkforward evaluation
        run: python scripts/walkforward_evaluation.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build report health gate
        run: python scripts/report_health_gate.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Validate data contract
        run: python scripts/data_contract_validator.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build repository anomaly report
        run: python scripts/repo_anomaly_report.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build model data root cause report
        run: python scripts/model_data_root_cause_report.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build governance HTML report
        run: python scripts/html_report_builder.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build public site data
        run: python scripts/build_public_site_data.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Refresh pipeline manifest
        run: python scripts/pipeline_manifest.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Commit model governance reports
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          for path in \
            report/feature_missingness_report.json \
            report/feature_source_coverage_report.json \
            report/feature_priority_report.json \
            report/artifact_quarantine_report.json \
            report/walkforward_evaluation.json \
            report/walkforward_predictions.csv \
            report/report_health_gate.json \
            report/data_contract_report.json \
            report/repo_anomaly_report.json \
            report/model_data_root_cause_report.json \
            report/index.html \
            report/pipeline_manifest.json \
            site/data/public_dashboard.json; do
            if [ -f "$path" ]; then
              git add -f "$path"
            fi
          done

          git commit -m "Update model governance diagnostics [skip ci]" || echo "No changes"
          git pull --rebase origin "${GITHUB_REF_NAME:-main}"
          git push origin "HEAD:${GITHUB_REF_NAME:-main}"
