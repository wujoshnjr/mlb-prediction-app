name: Deploy Public Site to Cloudflare

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Refresh Public Site Data
      - Hourly Prediction Update
    types:
      - completed
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - 'report/index.html'
      - 'wrangler.toml'
      - '.github/workflows/deploy_cloudflare.yml'

permissions:
  contents: read

concurrency:
  group: cloudflare-public-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-public-site:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PUBLIC_URL: https://mlb-prediction-app.wujoshnjr.workers.dev/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Require Cloudflare secrets
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "Missing CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID. Deployment cannot update the public workers.dev site."
            exit 1
          fi

      - name: Verify static site files
        run: |
          set -euo pipefail
          test -f wrangler.toml
          test -f site/index.html
          test -f site/styles.css
          test -f site/app.js
          test -f site/data/public_dashboard.json
          test -f report/index.html
          python -m json.tool site/data/public_dashboard.json >/dev/null
          grep -q 'MLB Paper Prediction Board' site/index.html
          grep -q 'MLB Paper Prediction Board' report/index.html
          grep -q 'public_dashboard_v2_paper_board' site/data/public_dashboard.json
          echo "Static site files and report/index.html are v2 paper-board ready."

      - name: Deploy Worker static assets
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.toml

      - name: Verify deployed public page
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5 6; do
            echo "Checking deployed page attempt ${attempt}..."
            body="$(curl -fsSL "${PUBLIC_URL}?v=${GITHUB_SHA}-${attempt}" || true)"
            if printf '%s' "$body" | grep -q 'MLB Paper Prediction Board'; then
              echo "Public page is updated to MLB Paper Prediction Board."
              exit 0
            fi
            printf '%s' "$body" | head -c 500 || true
            echo
            sleep 10
          done
          echo "Public page did not contain MLB Paper Prediction Board after deployment."
          exit 1
