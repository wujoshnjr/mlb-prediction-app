name: Shadow Feature Validation

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Hourly Prediction Update
    types:
      - completed
  push:
    branches:
      - main
    paths:
      - 'data/training_samples.csv'
      - 'report/feature_source_freshness_audit.json'
      - 'report/feature_promotion_candidate_report.json'
      - 'scripts/feature_promotion_candidate_report.py'
      - 'scripts/shadow_feature_experiment_report.py'
      - 'scripts/shadow_feature_decision_report.py'
      - 'scripts/shadow_feature_ablation_report.py'
      - 'scripts/feature_source_freshness_audit.py'
      - '.github/workflows/shadow_feature_validation.yml'

permissions:
  contents: write

concurrency:
  group: shadow-feature-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-shadow-features:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate shadow feature scripts
        run: |
          set -euo pipefail
          python -m py_compile \
            scripts/feature_source_freshness_audit.py \
            scripts/feature_promotion_candidate_report.py \
            scripts/shadow_feature_experiment_report.py \
            scripts/shadow_feature_decision_report.py \
            scripts/shadow_feature_ablation_report.py
          python scripts/feature_source_freshness_audit.py
          IGNORE_SHADOW_ABLATION=1 python scripts/feature_promotion_candidate_report.py
          python scripts/shadow_feature_experiment_report.py
          python scripts/shadow_feature_decision_report.py
          python scripts/shadow_feature_ablation_report.py
          python scripts/feature_promotion_candidate_report.py
          python -m json.tool report/feature_source_freshness_audit.json >/dev/null
          python -m json.tool report/feature_promotion_candidate_report.json >/dev/null
          python -m json.tool report/shadow_feature_experiment_report.json >/dev/null
          python -m json.tool report/shadow_feature_decision_report.json >/dev/null
          python -m json.tool report/shadow_feature_ablation_report.json >/dev/null
          test -s report/shadow_feature_experiment_rows.csv
          test -s report/shadow_feature_ablation_rows.csv

      - name: Commit shadow validation outputs
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME:-main}"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add -f \
            report/feature_source_freshness_audit.json \
            report/feature_promotion_candidate_report.json \
            report/shadow_feature_experiment_report.json \
            report/shadow_feature_experiment_rows.csv \
            report/shadow_feature_decision_report.json \
            report/shadow_feature_ablation_report.json \
            report/shadow_feature_ablation_rows.csv
          if git diff --cached --quiet; then
            echo "No shadow validation changes to commit."
          else
            git commit -m "Refresh shadow feature validation"
          fi
          git pull --rebase --autostash origin "$BRANCH"
          if ! git push origin "HEAD:$BRANCH"; then
            git pull --rebase --autostash origin "$BRANCH"
            git push origin "HEAD:$BRANCH"
          fi
